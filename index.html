<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Lokasi</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#2193b0,#6dd5ed);
  color:white;
  text-align:center;
}

.box{
  margin-top:120px;
  padding:20px;
}

.card{
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#00e676;
  font-weight:bold;
  font-size:16px;
}

.status{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
  <div class="card">
    <h2>📍 Bagikan Lokasi</h2>
    <p>Tekan tombol di bawah untuk mengirim lokasi Anda.</p>

    <button onclick="kirimLokasi()">Kirim Lokasi</button>

    <div id="status" class="status">Menunggu...</div>
  </div>
</div>

<script>
function kirimLokasi(){

  let status = document.getElementById("status");
  status.innerHTML = "Meminta izin...";

  navigator.geolocation.getCurrentPosition(

    function(pos){

      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      status.innerHTML = "Mengirim data...";

      fetch("https://script.google.com/macros/s/AKfycbw2q8jMhiz3W0FRQ0_C-8hCA3WVAxAqmjeQ3snUsI0j6AMlYYNT_RrPTfjjFxxa48Yv/exec?lat="+lat+"&lon="+lon)
      .then(()=>{
        status.innerHTML = "✅ Lokasi berhasil dikirim";
      })
      .catch(()=>{
        status.innerHTML = "❌ Gagal kirim";
      });

    },

    function(err){
      status.innerHTML = "❌ Izin ditolak";
    }

  );
}
</script>

</body>
</html>
